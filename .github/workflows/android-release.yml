name: Android Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      run: echo "VERSION_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode release keystore
      run: echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 --decode > ${{ github.workspace }}/release.keystore

    - name: Run unit tests
      run: ./gradlew test

    - name: Build signed release APK
      env:
        RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Build signed release AAB
      env:
        RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: ./gradlew bundleRelease

    - name: Rename artifacts
      run: |
        cp app/build/outputs/apk/release/app-release.apk FOSStenbuch-${{ env.VERSION_NAME }}.apk
        cp app/build/outputs/bundle/release/app-release.aab FOSStenbuch-${{ env.VERSION_NAME }}.aab

    - name: Clean up keystore
      if: always()
      run: rm -f ${{ github.workspace }}/release.keystore

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: FOSStenbuch ${{ env.VERSION_NAME }}
        generate_release_notes: true
        files: |
          FOSStenbuch-${{ env.VERSION_NAME }}.apk
          FOSStenbuch-${{ env.VERSION_NAME }}.aab